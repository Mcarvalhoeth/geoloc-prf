<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0c10">
  <title>GeoLoc PRF</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Barlow+Condensed:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10;
      --surface: #10141c;
      --border: #1e2530;
      --accent: #00e5ff;
      --accent2: #ff6b00;
      --text: #e8edf5;
      --muted: #4a5568;
      --ok: #00d68f;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; }
    body { display: flex; flex-direction: column; min-height: 100dvh; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .logo { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 20px; color: var(--accent); }
    .status { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .dot.active { background: var(--ok); animation: pulse 1.5s infinite; }
    .dot.loading { background: #ffcc00; animation: pulse 0.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)} }
    .main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; position: relative; }
    .card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,var(--accent),transparent); }
    .card-label { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; font-family:'JetBrains Mono',monospace; }
    .card-value { font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; color:var(--accent); line-height:1.2; word-break:break-all; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .rodovia-card { background: linear-gradient(135deg, #0d1520 0%, #101820 100%); border: 1px solid #1e3040; border-radius: 14px; padding: 24px; position: relative; }
    .rodovia-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:linear-gradient(90deg,var(--accent2),var(--accent)); }
    .rodovia-name { font-family:'JetBrains Mono',monospace; font-size:40px; font-weight:800; color:var(--accent2); letter-spacing:-1px; }
    .rodovia-km { font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:700; color:var(--accent); margin-top:12px; }
    .rodovia-muni { font-size:13px; color:var(--muted); margin-top:12px; }
    .btn-main { width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:12px; font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
    .btn-main:active { transform:scale(.98); opacity:.9; }
    .btn-main.stop { background:var(--accent2); }
    .btn-main.loading { background:#ffcc00; animation:loadpulse .8s infinite; }
    @keyframes loadpulse { 0%,100%{opacity:1}50%{opacity:.7} }
    .error { background:#1a0a0a; border:1px solid #3d1515; border-radius:12px; padding:14px 18px; color:#ff6b6b; font-size:14px; display:none; }
    .ts { text-align:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:2px; padding:8px 0; }
    .spinner { display:inline-block; width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn-share { width:100%; padding:14px; background:transparent; color:var(--accent); border:1px solid var(--accent); border-radius:12px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; display:none; margin-top:-4px; }
    .btn-share:active { background:var(--accent); color:#000; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#00d68f; color:#000; padding:10px 20px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; letter-spacing:1px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
    .toast.show { opacity:1; }
    .view-banner { background:linear-gradient(135deg,#0d1a10,#101a14); border:1px solid #1e4030; border-radius:12px; padding:14px 18px; color:#00d68f; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:1px; display:none; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">GEOLOC PRF</div>
  <div class="status">
    <span id="status-txt">OFFLINE</span>
    <div class="dot" id="dot"></div>
  </div>
</div>

<div class="main">

  <div class="error" id="error"><span id="error-text"></span></div>
  <div class="view-banner" id="view-banner">📡 MODO VISUALIZAÇÃO REMOTA — localização recebida de outro dispositivo</div>

  <!-- RODOVIA / KM -->
  <div class="rodovia-card">
    <div class="card-label">🛣️ Rodovia / KM</div>
    <div class="rodovia-name" id="rod-name">—</div>
    <div class="rodovia-km" id="rod-km">Aguardando GPS...</div>
    <div class="rodovia-muni" id="rod-muni"></div>
  </div>

  <!-- LAT / LON -->
  <div class="grid2">
    <div class="card">
      <div class="card-label">Latitude</div>
      <div class="card-value" id="lat">—</div>
    </div>
    <div class="card">
      <div class="card-label">Longitude</div>
      <div class="card-value" id="lon">—</div>
    </div>
  </div>

  <div class="ts" id="ts">—</div>
  <button class="btn-main" id="btn-main" onclick="toggleTracking()">INICIAR RASTREAMENTO</button>
  <button class="btn-share" id="btn-share" onclick="compartilharLocalizacao()">📡 COMPARTILHAR LOCALIZAÇÃO</button>

</div>
<div class="toast" id="toast"></div>

<script>
let watchId = null, tracking = false, lastData = null;

const $ = id => document.getElementById(id);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Remote control: check URL params for shared location
(function() {
  const p = new URLSearchParams(location.search);
  if (p.has('lat') && p.has('lon')) {
    const lat = parseFloat(p.get('lat'));
    const lon = parseFloat(p.get('lon'));
    if (isNaN(lat) || isNaN(lon)) return;
    $('view-banner').style.display = 'block';
    $('lat').textContent = lat.toFixed(6);
    $('lon').textContent = lon.toFixed(6);
    if (p.get('road')) $('rod-name').textContent = decodeURIComponent(p.get('road'));
    if (p.get('km')) $('rod-km').textContent = 'KM ' + decodeURIComponent(p.get('km'));
    if (p.get('muni')) $('rod-muni').textContent = decodeURIComponent(p.get('muni'));
    if (p.get('ts')) $('ts').textContent = decodeURIComponent(p.get('ts'));
    $('btn-main').style.display = 'none';
    const mapBtn = document.createElement('a');
    mapBtn.href = `https://www.google.com/maps?q=${lat},${lon}`;
    mapBtn.target = '_blank';
    mapBtn.rel = 'noopener';
    mapBtn.className = 'btn-main';
    mapBtn.style.cssText = 'display:block;text-align:center;text-decoration:none;margin-top:0;';
    mapBtn.textContent = 'VER NO GOOGLE MAPS';
    $('btn-main').parentNode.insertBefore(mapBtn, $('btn-main').nextSibling);
  }
})();

function toggleTracking() { tracking ? stopTracking() : startTracking(); }

function startTracking() {
  if (!navigator.geolocation) { showError('GPS não suportado.'); return; }
  tracking = true;
  $('btn-main').textContent = 'OBTENDO SINAL...';
  $('btn-main').className = 'btn-main loading';
  $('dot').className = 'dot loading';
  $('status-txt').textContent = 'BUSCANDO';
  $('error').style.display = 'none';
  watchId = navigator.geolocation.watchPosition(onSuccess, onError, {
    enableHighAccuracy: true, timeout: 30000, maximumAge: 2000
  });
}

function stopTracking() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  watchId = null; tracking = false;
  $('btn-main').textContent = 'INICIAR RASTREAMENTO';
  $('btn-main').className = 'btn-main';
  $('dot').className = 'dot';
  $('status-txt').textContent = 'OFFLINE';
  $('btn-share').style.display = 'none';
}

function compartilharLocalizacao() {
  if (!lastData) return;
  const p = new URLSearchParams();
  p.set('lat', lastData.latitude.toFixed(6));
  p.set('lon', lastData.longitude.toFixed(6));
  const road = $('rod-name').textContent;
  const km = $('rod-km').textContent.replace('KM ','');
  const muni = $('rod-muni').textContent;
  const ts = $('ts').textContent;
  if (road && road !== '—') p.set('road', road);
  if (km && km !== 'não disponível' && km !== 'buscando...') p.set('km', km);
  if (muni) p.set('muni', muni);
  if (ts && ts !== '—') p.set('ts', ts);
  const url = location.origin + location.pathname + '?' + p.toString();
  if (navigator.share) {
    navigator.share({ title: 'GeoLoc PRF — Localização', text: `${road} KM ${km}\n${muni}`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('LINK COPIADO!')).catch(() => {
      prompt('Copie o link:', url);
    });
  }
}

function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function onSuccess(pos) {
  const { latitude, longitude } = pos.coords;
  $('btn-main').textContent = 'PARAR RASTREAMENTO';
  $('btn-main').className = 'btn-main stop';
  $('dot').className = 'dot active';
  $('status-txt').textContent = 'AO VIVO';
  $('lat').textContent = latitude.toFixed(6);
  $('lon').textContent = longitude.toFixed(6);
  const now = new Date();
  $('ts').textContent = now.toLocaleTimeString('pt-BR') + ' · ' + now.toLocaleDateString('pt-BR');
  lastData = { latitude, longitude };
  $('btn-share').style.display = 'block';
  buscarRodovia(latitude, longitude);
}

function onError(err) {
  const msgs = {1:'Permissão negada.',2:'Sinal indisponível.',3:'Tempo limite excedido.'};
  showError(msgs[err.code] || 'Erro GPS.');
  $('btn-main').textContent = 'TENTAR NOVAMENTE'; $('btn-main').className = 'btn-main';
  $('dot').className = 'dot'; $('status-txt').textContent = 'ERRO'; tracking = false;
}

function showError(msg) { $('error').style.display='block'; $('error-text').textContent=msg; }

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function projetarSegmento(px,py,ax,ay,bx,by) {
  const dx=bx-ax, dy=by-ay, len2=dx*dx+dy*dy;
  if(len2===0) return {dist:haversine(px,py,ax,ay),t:0};
  let t=((px-ax)*dx+(py-ay)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  return {dist:haversine(px,py,ax+t*dx,ay+t*dy),t};
}

function calcularKMnaVia(lat,lon,geom) {
  try {
    let menorDist=Infinity,distAc=0,distNo=0;
    for(let i=0;i<geom.length-1;i++){
      const A=geom[i],B=geom[i+1],segLen=haversine(A.lat,A.lon,B.lat,B.lon);
      const proj=projetarSegmento(lat,lon,A.lat,A.lon,B.lat,B.lon);
      if(proj.dist<menorDist){menorDist=proj.dist;distNo=distAc+proj.t*segLen;}
      distAc+=segLen;
    }
    return distNo;
  } catch(e){return null;}
}

async function buscarRodovia(lat,lon) {
  $('rod-km').innerHTML='<span class="spinner"></span> buscando...';
  try {
    // Query 1: Vias com referência
    const q1=`[out:json][timeout:12];(way(around:150,${lat},${lon})[highway][ref];way(around:150,${lat},${lon})[highway~"^(motorway|trunk|primary|secondary)$"];);out body geom;`;
    const r1=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q1)});
    if(!r1.ok) throw new Error('API');
    const d1=await r1.json(); const ways=d1.elements||[];

    // Query 2: Marcos de KM
    const q2=`[out:json][timeout:8];(node(around:500,${lat},${lon})[highway=milestone];node(around:500,${lat},${lon})["ref:km"];node(around:500,${lat},${lon})["distance"];);out body;`;
    const r2=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q2)});
    const d2=r2.ok?await r2.json():{elements:[]};
    const marcos=d2.elements||[];

    const comRef=ways.filter(w=>w.tags&&w.tags.ref);
    const alvo=comRef.length>0?comRef[0]:(ways.length>0?ways[0]:null);
    let rodoviaName='—', kmInfo=null;

    if(alvo){
      const tags=alvo.tags||{};
      rodoviaName=tags.ref||tags.name||'—';

      // Tentar usar marco mais próximo
      if(marcos.length>0){
        let melhor=null,menorD=Infinity;
        for(const m of marcos){
          const d=haversine(lat,lon,m.lat,m.lon);
          if(d<menorD){menorD=d;melhor=m;}
        }
        if(melhor){
          const t=melhor.tags||{};
          const raw=t['ref:km']||t.distance||t.milestone;
          if(raw){const val=parseFloat(String(raw).replace(',','.'));if(!isNaN(val)){kmInfo=val.toFixed(1);}}
        }
      }

      // Se não achou marco, calcular com geometria
      if(!kmInfo&&alvo.geometry&&alvo.geometry.length>1){
        const kmBase=parseFloat(tags['ref:km:from']||tags['loc_ref']||'0')||0;
        const dist=calcularKMnaVia(lat,lon,alvo.geometry);
        if(dist!==null){kmInfo=(kmBase+dist).toFixed(1);}
      }
    }
    $('rod-name').textContent=rodoviaName;
    $('rod-km').textContent=kmInfo?'KM '+kmInfo:'KM não disponível';
    await preencherMunicipio(lat,lon);
  } catch(e){
    await fallbackNominatim(lat,lon);
  }
}

async function preencherMunicipio(lat,lon){
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=pt-BR&zoom=10`,{headers:{'User-Agent':'GeoLocPRF/1.0'}});
    const data=await res.json(); const r=data.address||{};
    $('rod-muni').textContent=[r.city||r.town||r.village||r.municipality||'',r.state_code||r.state||''].filter(Boolean).join(' · ');
  }catch(e){}
}

async function fallbackNominatim(lat,lon){
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=pt-BR`,{headers:{'User-Agent':'GeoLocPRF/1.0'}});
    const data=await res.json(); const r=data.address||{};
    $('rod-name').textContent=r.road||r.highway||'Via desconhecida';
    $('rod-km').textContent='KM indisponível';
    $('rod-muni').textContent=[r.city||r.town||r.village||r.municipality||'',r.state_code||r.state||''].filter(Boolean).join(' · ');
  }catch(e){$('rod-name').textContent='Sem conexão';$('rod-km').textContent='Verifique internet';}
}
</script>

</body>
</html>
