<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0c10">
  <title>GeoLoc PRF</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Barlow+Condensed:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #10141c; --border: #1e2530;
      --accent: #00e5ff; --accent2: #ff6b00; --text: #e8edf5;
      --muted: #4a5568; --ok: #00d68f; --warn: #ffcc00;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; }
    body { display: flex; flex-direction: column; min-height: 100dvh; }

    .header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); background:var(--surface); }
    .logo { font-family:'JetBrains Mono',monospace; font-weight:800; font-size:18px; color:var(--accent); letter-spacing:1px; }
    .status { display:flex; align-items:center; gap:8px; font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--muted); }
    .dot { width:10px; height:10px; border-radius:50%; background:var(--muted); transition:background .3s; }
    .dot.active { background:var(--ok); animation:pulse 1.5s infinite; }
    .dot.loading { background:var(--warn); animation:pulse .6s infinite; }
    .dot.error { background:#ff6b6b; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)} }

    .main { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    /* Base card */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; position:relative; }
    .card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,var(--accent),transparent); border-radius:12px 12px 0 0; }
    .card-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; font-family:'JetBrains Mono',monospace; }
    .card-value { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); line-height:1.2; }
    .card-sub { font-size:11px; color:var(--muted); margin-top:4px; font-family:'JetBrains Mono',monospace; }

    /* Rodovia card */
    .rodovia-card { background:linear-gradient(135deg,#0d1520,#101820); border:1px solid #1e3040; border-radius:14px; padding:20px; position:relative; overflow:hidden; }
    .rodovia-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:linear-gradient(90deg,var(--accent2),var(--accent)); }
    .rodovia-card::after { content:''; position:absolute; bottom:-30px;right:-30px; width:120px;height:120px; border-radius:50%; background:rgba(0,229,255,.03); }
    .rodovia-name { font-family:'JetBrains Mono',monospace; font-size:42px; font-weight:800; color:var(--accent2); letter-spacing:-1px; line-height:1; }
    .rodovia-km { font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:700; color:var(--accent); margin-top:10px; }
    .rodovia-acc { font-size:11px; color:var(--ok); font-family:'JetBrains Mono',monospace; margin-top:6px; display:none; }
    .rodovia-acc.poor { color:var(--warn); }
    .rodovia-acc.bad { color:#ff6b6b; }

    /* Município card */
    .muni-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; position:relative; }
    .muni-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,#7c3aed,transparent); border-radius:12px 12px 0 0; }
    .muni-nome { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:var(--text); line-height:1.2; }
    .muni-uf { font-size:12px; color:var(--muted); margin-top:4px; font-family:'JetBrains Mono',monospace; }
    .muni-ibge { display:inline-block; margin-top:6px; background:#1a1040; border:1px solid #2d1f6e; border-radius:6px; padding:3px 8px; font-size:11px; font-family:'JetBrains Mono',monospace; color:#a78bfa; letter-spacing:1px; }

    /* Speed card */
    .speed-card { background:linear-gradient(135deg,#0d1a10,#101c12); border:1px solid #1e3020; border-radius:12px; padding:14px 16px; position:relative; }
    .speed-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,var(--ok),transparent); border-radius:12px 12px 0 0; }
    .speed-value { font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:800; color:var(--ok); line-height:1; }
    .speed-unit { font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-top:2px; }

    /* Botões */
    .btn-main { width:100%; padding:16px; background:var(--accent); color:#000; border:none; border-radius:12px; font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
    .btn-main:active { transform:scale(.98); opacity:.9; }
    .btn-main.stop { background:var(--accent2); }
    .btn-main.loading { background:var(--warn); color:#000; animation:loadpulse .8s infinite; }
    @keyframes loadpulse { 0%,100%{opacity:1}50%{opacity:.7} }
    .btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn-sec { padding:13px 8px; background:var(--surface); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:6px; }
    .btn-sec:active { opacity:.7; transform:scale(.97); }
    .btn-sec:disabled { opacity:.3; cursor:default; }
    .btn-medir { width:100%; padding:14px; background:#0d1a2a; border:1px solid #1e3a5f; border-radius:12px; color:#60a5fa; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
    .btn-medir:disabled { opacity:.3; cursor:default; }
    .btn-medir.ativa { background:#0d2a0d; border-color:#1e5f1e; color:var(--ok); }

    /* Card de medição */
    .medicao-card { background:#0a0f1a; border:1px solid #1e3a5f; border-radius:14px; padding:16px; display:none; }
    .medicao-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,#3b82f6,transparent); border-radius:14px 14px 0 0; }
    .medicao-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .medicao-titulo { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#60a5fa; font-family:'JetBrains Mono',monospace; }
    .medicao-total-label { font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
    .medicao-total-val { font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:800; color:#60a5fa; margin-bottom:12px; }
    .medicao-lista { max-height:200px; overflow-y:auto; margin-bottom:12px; display:flex; flex-direction:column; gap:4px; }
    .med-ponto { display:grid; grid-template-columns:28px 1fr auto; align-items:center; gap:6px; padding:7px 10px; background:#0d1520; border-radius:8px; border:1px solid #1e2a40; }
    .med-idx { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; color:#60a5fa; }
    .med-coord { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text); }
    .med-dist { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ok); white-space:nowrap; }
    .med-empty { font-size:13px; color:var(--muted); text-align:center; padding:16px; }
    .medicao-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .btn-marcar { padding:13px; background:#0d2a0d; border:1px solid #1e5f1e; border-radius:10px; color:var(--ok); font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
    .btn-marcar:active { transform:scale(.97); }
    .btn-marcar:disabled { opacity:.3; cursor:default; }
    .btn-limpar { padding:13px; background:#1a0a0a; border:1px solid #3d1515; border-radius:10px; color:#ff6b6b; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
    .btn-limpar:active { transform:scale(.97); }

    .error { background:#1a0a0a; border:1px solid #3d1515; border-radius:12px; padding:12px 16px; color:#ff6b6b; font-size:14px; display:none; }
    .ts { text-align:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:2px; padding:4px 0; }
    .spinner { display:inline-block; width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ok); color:#000; padding:10px 24px; border-radius:8px; font-weight:700; font-size:14px; font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:100; white-space:nowrap; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">GEOLOC PRF</div>
  <div class="status">
    <span id="status-txt">OFFLINE</span>
    <div class="dot" id="dot"></div>
  </div>
</div>

<div class="main">

  <div class="error" id="error"><span id="error-text"></span></div>

  <!-- RODOVIA / KM -->
  <div class="rodovia-card">
    <div class="card-label">🛣️ Rodovia / KM</div>
    <div class="rodovia-name" id="rod-name">—</div>
    <div class="rodovia-km" id="rod-km">Aguardando GPS...</div>
    <div class="rodovia-acc" id="rod-acc"></div>
  </div>

  <!-- MUNICÍPIO + IBGE -->
  <div class="muni-card">
    <div class="card-label">📍 Município</div>
    <div class="muni-nome" id="muni-nome">—</div>
    <div class="muni-uf" id="muni-uf"></div>
    <span class="muni-ibge" id="muni-ibge" style="display:none"></span>
  </div>

  <!-- VELOCIDADE + PRECISÃO -->
  <div class="grid2">
    <div class="speed-card">
      <div class="card-label">Velocidade</div>
      <div class="speed-value" id="speed">—</div>
      <div class="speed-unit">km/h</div>
    </div>
    <div class="card">
      <div class="card-label">Precisão GPS</div>
      <div class="card-value" id="acc-val">—</div>
      <div class="card-sub">metros</div>
    </div>
  </div>

  <!-- LAT / LON -->
  <div class="grid2">
    <div class="card">
      <div class="card-label">Latitude</div>
      <div class="card-value" id="lat">—</div>
    </div>
    <div class="card">
      <div class="card-label">Longitude</div>
      <div class="card-value" id="lon">—</div>
    </div>
  </div>

  <div class="ts" id="ts">—</div>

  <button class="btn-main" id="btn-main" onclick="toggleTracking()">INICIAR RASTREAMENTO</button>

  <!-- Ações -->
  <div class="btn-grid">
    <button class="btn-sec" id="btn-copy" onclick="copiarCoordenadas()" disabled>📋 Copiar Coords</button>
    <button class="btn-sec" id="btn-maps" onclick="abrirMaps()" disabled>🗺️ Ver no Maps</button>
  </div>

  <!-- Medir trecho -->
  <button class="btn-medir" id="btn-medir" onclick="toggleMedicao()" disabled>📏 MEDIR TRECHO</button>

  <!-- Card de medição (aparece ao iniciar) -->
  <div class="medicao-card" id="medicao-card">
    <div class="medicao-header">
      <span class="medicao-titulo">📏 Medição de Trecho</span>
      <span class="medicao-total-label">Total</span>
    </div>
    <div class="medicao-total-val" id="med-total">—</div>
    <div class="medicao-lista" id="med-lista">
      <div class="med-empty">Vá até o ponto inicial e toque em MARCAR PONTO.</div>
    </div>
    <div class="medicao-btns">
      <button class="btn-marcar" id="btn-marcar" onclick="adicionarMarco()">+ MARCAR PONTO</button>
      <button class="btn-limpar" onclick="limparMedicao()">🗑️ LIMPAR</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let watchId = null, tracking = false, lastData = null;
let isFetching = false, lastFetchTime = 0;
const MIN_FETCH_INTERVAL = 6000;

// Estado da medição
let medicao = { ativa: false, pontos: [] };

const $ = id => document.getElementById(id);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── Rastreamento GPS ─────────────────────────────────────────────────────

function toggleTracking() { tracking ? stopTracking() : startTracking(); }

function startTracking() {
  if (!navigator.geolocation) { showError('GPS não suportado neste dispositivo.'); return; }
  tracking = true;
  $('btn-main').textContent = 'OBTENDO SINAL...';
  $('btn-main').className = 'btn-main loading';
  $('dot').className = 'dot loading';
  $('status-txt').textContent = 'BUSCANDO';
  $('error').style.display = 'none';
  watchId = navigator.geolocation.watchPosition(onSuccess, onError, {
    enableHighAccuracy: true, timeout: 30000, maximumAge: 2000
  });
}

function stopTracking() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = null; tracking = false; isFetching = false;
  $('btn-main').textContent = 'INICIAR RASTREAMENTO';
  $('btn-main').className = 'btn-main';
  $('dot').className = 'dot';
  $('status-txt').textContent = 'OFFLINE';
  $('btn-copy').disabled = true;
  $('btn-maps').disabled = true;
  $('btn-medir').disabled = true;
}

function onSuccess(pos) {
  const { latitude, longitude, speed, accuracy } = pos.coords;

  $('btn-main').textContent = 'PARAR RASTREAMENTO';
  $('btn-main').className = 'btn-main stop';
  $('dot').className = 'dot active';
  $('status-txt').textContent = 'AO VIVO';

  $('lat').textContent = latitude.toFixed(6);
  $('lon').textContent = longitude.toFixed(6);
  $('speed').textContent = (speed !== null && speed >= 0) ? Math.round(speed * 3.6) : '—';

  if (accuracy !== null) {
    $('acc-val').textContent = Math.round(accuracy);
    const el = $('rod-acc');
    if (accuracy <= 15) {
      el.textContent = `GPS ±${Math.round(accuracy)}m · Alta precisão`;
      el.className = 'rodovia-acc';
    } else if (accuracy <= 50) {
      el.textContent = `GPS ±${Math.round(accuracy)}m · Precisão média`;
      el.className = 'rodovia-acc poor';
    } else {
      el.textContent = `GPS ±${Math.round(accuracy)}m · Baixa precisão`;
      el.className = 'rodovia-acc bad';
    }
    el.style.display = 'block';
  }

  const now = new Date();
  $('ts').textContent = now.toLocaleTimeString('pt-BR') + ' · ' + now.toLocaleDateString('pt-BR');

  lastData = { latitude, longitude, accuracy };
  $('btn-copy').disabled = false;
  $('btn-maps').disabled = false;
  $('btn-medir').disabled = false;

  buscarRodovia(latitude, longitude);
}

function onError(err) {
  const msgs = { 1: 'Permissão de GPS negada.', 2: 'Sinal GPS indisponível.', 3: 'Tempo limite do GPS excedido.' };
  showError(msgs[err.code] || 'Erro desconhecido no GPS.');
  $('btn-main').textContent = 'TENTAR NOVAMENTE';
  $('btn-main').className = 'btn-main';
  $('dot').className = 'dot error';
  $('status-txt').textContent = 'ERRO';
  tracking = false;
}

function showError(msg) { $('error').style.display = 'block'; $('error-text').textContent = msg; }

// ─── Toast ────────────────────────────────────────────────────────────────

function showToast(msg, duration = 2500) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ─── Copiar / Maps ────────────────────────────────────────────────────────

function copiarCoordenadas() {
  if (!lastData) return;
  const txt = `${lastData.latitude.toFixed(6)},${lastData.longitude.toFixed(6)}`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt)
      .then(() => showToast('✓ Coordenadas copiadas!'))
      .catch(() => copiarFallback(txt));
  } else {
    copiarFallback(txt);
  }
}

function copiarFallback(txt) {
  const el = document.createElement('textarea');
  el.value = txt;
  el.style.cssText = 'position:fixed;opacity:0;';
  document.body.appendChild(el);
  el.select();
  try { document.execCommand('copy'); showToast('✓ Coordenadas copiadas!'); }
  catch { showToast('Falha ao copiar. Tente manualmente.'); }
  document.body.removeChild(el);
}

function abrirMaps() {
  if (!lastData) return;
  window.open(`https://www.google.com/maps?q=${lastData.latitude},${lastData.longitude}`, '_blank', 'noopener');
}

// ─── Medição de Trecho ────────────────────────────────────────────────────

function toggleMedicao() {
  if (!medicao.ativa) {
    medicao = { ativa: true, pontos: [] };
    $('medicao-card').style.display = 'block';
    $('btn-medir').textContent = '⏹ ENCERRAR MEDIÇÃO';
    $('btn-medir').className = 'btn-medir ativa';
    atualizarMedicaoUI();
    $('medicao-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    const total = calcularTotal();
    if (medicao.pontos.length >= 2) {
      showToast(`Distância total: ${formatarDist(total)}`, 3500);
    }
    medicao.ativa = false;
    $('btn-medir').textContent = '📏 MEDIR TRECHO';
    $('btn-medir').className = 'btn-medir';
  }
}

function adicionarMarco() {
  if (!lastData) return;
  medicao.pontos.push({
    lat: lastData.latitude,
    lon: lastData.longitude,
    acc: lastData.accuracy,
    t: new Date()
  });
  atualizarMedicaoUI();
  showToast(`P${medicao.pontos.length} marcado`);
}

function atualizarMedicaoUI() {
  const pts = medicao.pontos;
  if (pts.length === 0) {
    $('med-lista').innerHTML = '<div class="med-empty">Vá até o ponto inicial e toque em MARCAR PONTO.</div>';
    $('med-total').textContent = '—';
    return;
  }

  let total = 0;
  let html = '';
  pts.forEach((p, i) => {
    let distStr = '—';
    if (i > 0) {
      const d = haversine(pts[i-1].lat, pts[i-1].lon, p.lat, p.lon) * 1000;
      total += d;
      distStr = '+' + formatarDist(d);
    }
    html += `<div class="med-ponto">
      <span class="med-idx">P${i+1}</span>
      <span class="med-coord">${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</span>
      <span class="med-dist">${distStr}</span>
    </div>`;
  });

  $('med-lista').innerHTML = html;
  $('med-total').textContent = pts.length >= 2 ? formatarDist(total) : '—';
  // Scroll para o último ponto
  const lista = $('med-lista');
  lista.scrollTop = lista.scrollHeight;
}

function calcularTotal() {
  const pts = medicao.pontos;
  let total = 0;
  for (let i = 1; i < pts.length; i++) {
    total += haversine(pts[i-1].lat, pts[i-1].lon, pts[i].lat, pts[i].lon) * 1000;
  }
  return total;
}

function formatarDist(metros) {
  if (metros < 1000) return `${Math.round(metros)} m`;
  return `${(metros / 1000).toFixed(3)} km`;
}

function limparMedicao() {
  medicao = { ativa: false, pontos: [] };
  $('medicao-card').style.display = 'none';
  $('btn-medir').textContent = '📏 MEDIR TRECHO';
  $('btn-medir').className = 'btn-medir';
}

// ─── Normalização de rodovia ──────────────────────────────────────────────

function normalizarRodovia(ref) {
  if (!ref) return '—';
  const br = ref.match(/\bBR[\s-]?(\d{2,3})\b/i);
  if (br) return `BR-${br[1]}`;
  const est = ref.match(/\b([A-Z]{2})[\s-]?(\d{2,4})\b/i);
  if (est) return `${est[1].toUpperCase()}-${est[2]}`;
  return ref;
}

// ─── Cálculos geométricos ─────────────────────────────────────────────────

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function projetarSegmento(px, py, ax, ay, bx, by) {
  const dx = bx-ax, dy = by-ay, len2 = dx*dx+dy*dy;
  if (len2 === 0) return { dist: haversine(px,py,ax,ay), t: 0 };
  let t = ((px-ax)*dx+(py-ay)*dy)/len2;
  t = Math.max(0, Math.min(1, t));
  return { dist: haversine(px,py,ax+t*dx,ay+t*dy), t };
}

function calcularKMnaVia(lat, lon, geom) {
  try {
    let menorDist = Infinity, distAc = 0, distNo = 0;
    for (let i = 0; i < geom.length - 1; i++) {
      const A = geom[i], B = geom[i+1];
      const segLen = haversine(A.lat, A.lon, B.lat, B.lon);
      const proj = projetarSegmento(lat, lon, A.lat, A.lon, B.lat, B.lon);
      if (proj.dist < menorDist) { menorDist = proj.dist; distNo = distAc + proj.t * segLen; }
      distAc += segLen;
    }
    return distNo;
  } catch { return null; }
}

// ─── API Overpass ─────────────────────────────────────────────────────────

async function buscarRodovia(lat, lon) {
  const now = Date.now();
  if (isFetching || (now - lastFetchTime) < MIN_FETCH_INTERVAL) return;
  isFetching = true;
  lastFetchTime = now;

  $('rod-km').innerHTML = '<span class="spinner"></span> buscando...';

  try {
    const q1 = `[out:json][timeout:12];(way(around:150,${lat},${lon})[highway][ref];way(around:150,${lat},${lon})[highway~"^(motorway|trunk|primary|secondary)$"];);out body geom;`;
    const r1 = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:'data='+encodeURIComponent(q1) });
    if (!r1.ok) throw new Error(`Overpass HTTP ${r1.status}`);
    const d1 = await r1.json();
    if (!d1 || !Array.isArray(d1.elements)) throw new Error('Resposta inválida');
    const ways = d1.elements;

    // Marcos de KM — raio maior (1km) para melhor interpolação
    const q2 = `[out:json][timeout:10];(node(around:1000,${lat},${lon})[highway=milestone];node(around:1000,${lat},${lon})["ref:km"];node(around:1000,${lat},${lon})["distance"];);out body;`;
    const r2 = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:'data='+encodeURIComponent(q2) });
    const d2 = r2.ok ? await r2.json() : { elements: [] };
    const marcos = (d2 && Array.isArray(d2.elements)) ? d2.elements : [];

    const comRef = ways.filter(w => w.tags && w.tags.ref);
    const alvo = comRef.length > 0 ? comRef[0] : (ways.length > 0 ? ways[0] : null);
    let rodoviaName = '—', kmInfo = null;

    if (alvo) {
      const tags = alvo.tags || {};
      rodoviaName = normalizarRodovia(tags.ref || tags.name);

      // Extrair marcos com valor de km válido, ordenados por distância
      const marcosComKm = marcos
        .map(m => {
          const t = m.tags || {};
          const raw = t['ref:km'] || t.distance || t.milestone;
          if (!raw) return null;
          const val = parseFloat(String(raw).replace(',', '.'));
          if (isNaN(val)) return null;
          return { km: val, dist: haversine(lat, lon, m.lat, m.lon), lat: m.lat, lon: m.lon };
        })
        .filter(Boolean)
        .sort((a, b) => a.dist - b.dist);

      if (marcosComKm.length >= 2) {
        // Interpolar entre os dois marcos mais próximos
        const A = marcosComKm[0], B = marcosComKm[1];
        const distAB = haversine(A.lat, A.lon, B.lat, B.lon); // km
        // Verifica se o usuário está aproximadamente entre A e B
        if (distAB > 0 && Math.abs(A.dist + B.dist - distAB) < 0.4) {
          const t = A.dist / distAB;
          const kmInterp = A.km + t * (B.km - A.km);
          kmInfo = kmInterp.toFixed(2);
        } else {
          kmInfo = A.km.toFixed(1);
        }
      } else if (marcosComKm.length === 1) {
        kmInfo = marcosComKm[0].km.toFixed(1);
      }

      // Fallback: geometria da via
      if (!kmInfo && alvo.geometry && alvo.geometry.length > 1) {
        const kmBase = parseFloat(tags['ref:km:from'] || tags['loc_ref'] || '0') || 0;
        const dist = calcularKMnaVia(lat, lon, alvo.geometry);
        if (dist !== null) kmInfo = (kmBase + dist).toFixed(1);
      }
    }

    $('rod-name').textContent = rodoviaName;
    $('rod-km').textContent = kmInfo ? 'KM ' + kmInfo : 'KM não disponível';
    await preencherMunicipio(lat, lon);

  } catch {
    await fallbackNominatim(lat, lon);
  } finally {
    isFetching = false;
  }
}

// ─── Município + IBGE ─────────────────────────────────────────────────────

async function preencherMunicipio(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=pt-BR&zoom=10`,
      { headers: { 'User-Agent': 'GeoLocPRF/1.0' } }
    );
    if (!res.ok) return;
    const data = await res.json();
    const r = data.address || {};
    const city = r.city || r.town || r.village || r.municipality || '';
    const uf = r.state_code || '';
    const state = r.state || '';

    $('muni-nome').textContent = city || '—';
    $('muni-uf').textContent = [uf, state].filter(Boolean).join(' · ');

    if (city && uf) buscarIBGE(city, uf);
  } catch { /* silencioso */ }
}

async function buscarIBGE(cidade, uf) {
  try {
    const res = await fetch(
      `https://servicodados.ibge.gov.br/api/v1/localidades/municipios?nome=${encodeURIComponent(cidade)}&orderBy=nome`
    );
    if (!res.ok) return;
    const lista = await res.json();
    if (!Array.isArray(lista) || lista.length === 0) return;
    const match = lista.find(m =>
      m.microrregiao?.mesorregiao?.UF?.sigla?.toUpperCase() === uf.toUpperCase()
    ) || lista[0];
    if (match?.id) {
      const ibgeEl = $('muni-ibge');
      ibgeEl.textContent = `IBGE ${match.id}`;
      ibgeEl.style.display = 'inline-block';
    }
  } catch { /* silencioso */ }
}

async function fallbackNominatim(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=pt-BR`,
      { headers: { 'User-Agent': 'GeoLocPRF/1.0' } }
    );
    if (!res.ok) throw new Error('Nominatim ' + res.status);
    const data = await res.json();
    const r = data.address || {};
    $('rod-name').textContent = normalizarRodovia(r.road || r.highway) || 'Via desconhecida';
    $('rod-km').textContent = 'KM indisponível';
    const city = r.city || r.town || r.village || r.municipality || '';
    const uf = r.state_code || '';
    $('muni-nome').textContent = city || '—';
    $('muni-uf').textContent = [uf, r.state].filter(Boolean).join(' · ');
    if (city && uf) buscarIBGE(city, uf);
  } catch {
    $('rod-name').textContent = 'Sem conexão';
    $('rod-km').textContent = 'Verifique a internet';
  }
}
