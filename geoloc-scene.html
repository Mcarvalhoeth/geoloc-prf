<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c10">
<title>GeoLoc PRF - Medição de Cena</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Barlow+Condensed:wght@400;600;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10; --surface: #10141c; --border: #1e2530;
    --accent: #00e5ff; --accent2: #ff6b00; --text: #e8edf5;
    --muted: #4a5568; --ok: #00d68f; --warn: #ffcc00;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; }
  body { display: flex; flex-direction: column; min-height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .logo { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 22px; letter-spacing: -1px; color: var(--accent); }
  .logo span { color: var(--accent2); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.active { background: var(--ok); animation: pulse 1.5s infinite; }
  .status-dot.loading { background: var(--warn); animation: pulse 0.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)} }

  .main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; position: relative; overflow: hidden; }
  .card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,var(--accent),transparent); }
  .card.orange::before { background:linear-gradient(90deg,var(--accent2),transparent); }

  .card-label { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; font-family:'JetBrains Mono',monospace; }
  .card-value { font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:700; color:var(--accent); line-height:1; }

  .btn-main { width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:12px; font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; -webkit-tap-highlight-color:transparent; }
  .btn-main:active { transform:scale(.98); opacity:.9; }
  .btn-main.loading { background:var(--warn); animation:loadpulse .8s infinite; }
  .btn-main.stop { background:var(--accent2); }
  @keyframes loadpulse { 0%,100%{opacity:1}50%{opacity:.7} }

  .error-msg { background:#1a0a0a; border:1px solid #3d1515; border-radius:12px; padding:14px 18px; color:#ff6b6b; font-size:14px; display:none; line-height:1.5; }
  .spinner { display:inline-block; width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg) } }

  /* Scene Styles */
  .scene-section { margin-top:20px; padding-top:12px; border-top:2px solid var(--border); }
  .zero-point-status { font-size:12px; color:var(--muted); font-family:'JetBrains Mono'; line-height:1.5; }
  .zero-point-status.active { color:var(--ok); }
  .btn-clear-zero { display:none; padding:8px 14px; background:none; border:1px solid #ff6b6b; color:#ff6b6b; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:12px; cursor:pointer; margin-left:8px; margin-top:12px; }

  .distance-card { background:var(--surface); border:2px solid var(--accent2); border-radius:12px; padding:16px 18px; position:relative; }
  .distance-value { font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:800; color:var(--accent2); }

  .marker-selector-group { display:flex; flex-direction:column; gap:8px; }
  .marker-select, .marker-input { padding:12px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:14px; }
  .marker-select:focus, .marker-input:focus { outline:none; border-color:var(--accent); background:rgba(0,229,255,0.05); }
  .marker-select option { background:var(--surface); color:var(--text); }
  .btn-mark { width:100%; padding:16px; background:var(--accent2); color:#000; border:none; border-radius:12px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:900; letter-spacing:1px; cursor:pointer; margin-top:8px; }

  .markers-list { display:flex; flex-direction:column; gap:8px; max-height:400px; overflow-y:auto; }
  .marker-item { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:8px; padding:12px; background:rgba(0,229,255,0.05); border:1px solid var(--border); border-radius:8px; font-size:12px; align-items:center; }
  .marker-item.corpo { background:rgba(255,107,107,0.05); border-color:rgba(255,107,107,0.3); }
  .marker-item.colisao { background:rgba(255,107,0,0.05); border-color:rgba(255,107,0,0.3); }
  .marker-item.frenagem { background:rgba(255,204,0,0.05); border-color:rgba(255,204,0,0.3); }
  .marker-item.roda_esq { background:rgba(0,214,143,0.05); border-color:rgba(0,214,143,0.3); }

  .marker-item-label { font-family:'JetBrains Mono',monospace; font-weight:700; }
  .marker-item-distance { font-family:'JetBrains Mono',monospace; color:var(--accent); }
  .marker-item-coords { font-size:11px; color:var(--muted); }
  .marker-item-time { font-size:10px; color:var(--muted); }

  .marker-btn-group { display:flex; gap:4px; }
  .marker-btn { padding:6px 8px; background:transparent; border:1px solid var(--border); border-radius:4px; color:var(--muted); font-size:11px; cursor:pointer; }
  .marker-btn.delete { border-color:#ff6b6b; color:#ff6b6b; }

  .btn-export-pdf { width:100%; padding:18px; background:var(--ok); color:#000; border:none; border-radius:12px; font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:12px; }
  .btn-export-pdf:disabled { background:var(--muted); opacity:0.5; cursor:not-allowed; }

  @media(max-width:480px) {
    .marker-item { grid-template-columns:1fr auto; }
    .marker-item-label { grid-column:1/-1; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">GEO<span>LOC</span> <span style="font-size:13px;color:var(--muted);font-weight:400">SCENE</span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="status-txt" style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;">OFFLINE</span>
    <div class="status-dot" id="dot"></div>
  </div>
</div>

<div class="main">
  <div class="error-msg" id="err-msg">⚠️ <span id="err-text"></span></div>

  <!-- SCENE MEASUREMENT -->
  <div class="scene-section">
    <div class="card">
      <div class="card-label">📍 Ponto Zero</div>
      <div class="zero-point-status" id="zero-point-status">Ponto Zero não definido</div>
      <button class="btn-main" id="btn-set-zero" style="margin-top:12px;background:var(--accent2);">DEFINIR PONTO ZERO</button>
      <button class="btn-clear-zero" id="btn-clear-zero">LIMPAR</button>
    </div>

    <div class="distance-card">
      <div class="card-label">📏 DISTÂNCIA DO PONTO ZERO</div>
      <div class="distance-value" id="distance-value">—</div>
      <div class="card-sub" style="font-size:12px; color:var(--muted); margin-top:5px;">metros</div>
    </div>

    <div class="card">
      <div class="card-label">➕ Marcar Ponto</div>
      <div class="marker-selector-group">
        <select id="marker-select" class="marker-select">
          <option value="corpo">🪦 Corpo</option>
          <option value="colisao">💥 Colisão</option>
          <option value="frenagem">🛑 Frenagem</option>
          <option value="roda_esq">🚗 Roda Dianteira Esquerda</option>
          <option value="outro">📍 Outro</option>
        </select>
        <input type="text" id="marker-desc" class="marker-input" placeholder="Descrição (opcional)">
        <button class="btn-mark" id="btn-mark">MARCAR PONTO ATUAL</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">📋 Marcadores Registrados (<span id="markers-count">0</span>)</div>
      <div class="markers-list" id="markers-list">
        <div style="padding:20px;text-align:center;color:var(--muted);">Nenhum marcador registrado</div>
      </div>
      <button class="btn-export-pdf" id="btn-export-pdf" disabled>📄 EXPORTAR PARA PDF</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function toRelativeCoordinates(lat, lon, lat0, lon0) {
  const R = 6371000;
  const x = R * (lon - lon0) * Math.cos((lat0 * Math.PI) / 180) * (Math.PI / 180);
  const y = R * (lat - lat0) * (Math.PI / 180);
  return { x: Math.round(x * 100) / 100, y: Math.round(y * 100) / 100 };
}

function showError(msg) {
  const errEl = $('err-msg');
  errEl.style.display = 'block';
  errEl.innerHTML = '⚠️ ' + msg;
  errEl.style.background = '#1a0a0a';
  errEl.style.borderColor = '#3d1515';
  errEl.style.color = '#ff6b6b';
}

function showInfo(msg) {
  const errEl = $('err-msg');
  errEl.style.display = 'block';
  errEl.innerHTML = 'ℹ️ ' + msg;
  errEl.style.background = 'rgba(0, 214, 143, 0.1)';
  errEl.style.borderColor = '#00d68f';
  errEl.style.color = '#00d68f';
  setTimeout(() => { errEl.style.display = 'none'; }, 3000);
}

// ═══════════════════════════════════════════════════════════════════
// SCENE MANAGER
// ═══════════════════════════════════════════════════════════════════
class SceneManager {
  constructor() {
    this.zeroPoint = null;
    this.markers = [];
    this.loadFromStorage();
  }

  setZeroPoint(lat, lon, rodovia = '', km = '', municipio = '') {
    this.zeroPoint = {
      id: 'zero_' + Date.now(),
      latitude: lat,
      longitude: lon,
      timestamp: Date.now(),
      rodovia, km, municipio
    };
    this.save();
    return this.zeroPoint;
  }

  clearZeroPoint() {
    this.zeroPoint = null;
    this.markers = [];
    this.save();
  }

  addMarker(lat, lon, type, description = '') {
    if (!this.zeroPoint) throw new Error('Ponto Zero não definido');

    const distance = haversine(this.zeroPoint.latitude, this.zeroPoint.longitude, lat, lon) * 1000;
    const relative = toRelativeCoordinates(lat, lon, this.zeroPoint.latitude, this.zeroPoint.longitude);

    const marker = {
      id: 'marker_' + Date.now() + '_' + Math.random(),
      type, latitude: lat, longitude: lon, timestamp: Date.now(),
      distanceFromZero: distance, xRelative: relative.x, yRelative: relative.y, description
    };

    this.markers.push(marker);
    this.save();
    return marker;
  }

  deleteMarker(markerId) {
    this.markers = this.markers.filter(m => m.id !== markerId);
    this.save();
  }

  updateMarker(markerId, updates) {
    const marker = this.markers.find(m => m.id === markerId);
    if (marker) Object.assign(marker, updates);
    this.save();
    return marker;
  }

  getDistanceFromZero(lat, lon) {
    if (!this.zeroPoint) return null;
    return haversine(this.zeroPoint.latitude, this.zeroPoint.longitude, lat, lon) * 1000;
  }

  save() {
    localStorage.setItem('scene_data', JSON.stringify({ zeroPoint: this.zeroPoint, markers: this.markers }));
  }

  loadFromStorage() {
    const data = localStorage.getItem('scene_data');
    if (data) {
      try {
        const parsed = JSON.parse(data);
        this.zeroPoint = parsed.zeroPoint;
        this.markers = parsed.markers || [];
      } catch (e) { console.error('Erro ao carregar cena', e); }
    }
  }

  export() {
    return { zeroPoint: this.zeroPoint, markers: this.markers, exportedAt: new Date().toISOString() };
  }
}

// ═══════════════════════════════════════════════════════════════════
// SCENE UI
// ═══════════════════════════════════════════════════════════════════
class SceneUIManager {
  constructor(sceneManager) {
    this.scene = sceneManager;
    this.currentMarkerType = 'outro';
    this.currentLocation = null;
    this.setupEventListeners();
  }

  setupEventListeners() {
    $('marker-select').addEventListener('change', e => { this.currentMarkerType = e.target.value; });
    $('btn-mark').addEventListener('click', () => this.markCurrentPosition());
    $('btn-set-zero').addEventListener('click', () => this.setCurrentZeroPoint());
    $('btn-clear-zero').addEventListener('click', () => this.clearZeroPoint());
    $('btn-export-pdf').addEventListener('click', () => this.exportPDF());
  }

  setCurrentZeroPoint() {
    if (!this.currentLocation) { showError('Aguarde sinal GPS antes de definir ponto zero.'); return; }
    const { latitude, longitude } = this.currentLocation;
    this.scene.setZeroPoint(latitude, longitude, 'Localização', '', '');
    this.updateZeroPointUI();
    showInfo('✓ Ponto Zero definido com sucesso!');
  }

  clearZeroPoint() {
    if (confirm('Limpar ponto zero e todos os marcadores?')) {
      this.scene.clearZeroPoint();
      this.updateZeroPointUI();
      this.renderMarkersList();
      showInfo('Ponto Zero e marcadores limpos.');
    }
  }

  markCurrentPosition() {
    if (!this.currentLocation) { showError('Aguarde sinal GPS para marcar ponto.'); return; }
    if (!this.scene.zeroPoint) { showError('Defina o Ponto Zero primeiro.'); return; }

    const { latitude, longitude } = this.currentLocation;
    const description = $('marker-desc').value || '';

    try {
      this.scene.addMarker(latitude, longitude, this.currentMarkerType, description);
      $('marker-desc').value = '';
      this.renderMarkersList();
      this.updateDistanceDisplay();
      showInfo(`✓ Marcador "${this.getMarkerLabel(this.currentMarkerType)}" registrado!`);
    } catch (e) { showError(e.message); }
  }

  updateZeroPointUI() {
    const hasZero = this.scene.zeroPoint !== null;
    const statusEl = $('zero-point-status');
    const btnEl = $('btn-set-zero');
    const btnClearEl = $('btn-clear-zero');

    if (hasZero) {
      const z = this.scene.zeroPoint;
      statusEl.innerHTML = `✓ <strong>Definido</strong><br>${z.latitude.toFixed(6)}, ${z.longitude.toFixed(6)}`;
      statusEl.classList.add('active');
      btnEl.textContent = 'REDEFINIR PONTO ZERO';
      btnClearEl.style.display = 'inline-block';
    } else {
      statusEl.textContent = 'Ponto Zero não definido';
      statusEl.classList.remove('active');
      btnEl.textContent = 'DEFINIR PONTO ZERO';
      btnClearEl.style.display = 'none';
    }
  }

  updateDistanceDisplay() {
    if (!this.currentLocation || !this.scene.zeroPoint) {
      $('distance-value').textContent = '—';
      return;
    }
    const dist = this.scene.getDistanceFromZero(this.currentLocation.latitude, this.currentLocation.longitude);
    if (dist !== null) $('distance-value').textContent = dist.toFixed(1) + ' m';
  }

  updateLocation(lat, lon) {
    this.currentLocation = { latitude: lat, longitude: lon };
    this.updateDistanceDisplay();
  }

  renderMarkersList() {
    const listEl = $('markers-list');
    const countEl = $('markers-count');
    const btnExport = $('btn-export-pdf');

    if (this.scene.markers.length === 0) {
      listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">Nenhum marcador registrado</div>';
      countEl.textContent = '0';
      btnExport.disabled = true;
      return;
    }

    countEl.textContent = this.scene.markers.length;
    btnExport.disabled = false;

    listEl.innerHTML = this.scene.markers.map(m => `
      <div class="marker-item ${m.type}">
        <div class="marker-item-label">${this.getMarkerLabel(m.type)}</div>
        <div class="marker-item-distance">${m.distanceFromZero.toFixed(1)} m</div>
        <div class="marker-item-coords">X: ${m.xRelative.toFixed(1)}m | Y: ${m.yRelative.toFixed(1)}m</div>
        <div class="marker-btn-group">
          <button class="marker-btn delete" onclick="sceneUI.deleteMarker('${m.id}')">✕</button>
        </div>
      </div>
    `).join('');
  }

  deleteMarker(markerId) {
    if (confirm('Deletar este marcador?')) {
      this.scene.deleteMarker(markerId);
      this.renderMarkersList();
      this.updateDistanceDisplay();
    }
  }

  getMarkerLabel(type) {
    const labels = { corpo: 'CORPO', colisao: 'COLISÃO', frenagem: 'FRENAGEM', roda_esq: 'RODA ESQ', outro: 'OUTRO' };
    return labels[type] || type;
  }

  getMarkerColor(type) {
    const colors = { corpo: '#ff6b6b', colisao: '#ff6b00', frenagem: '#ffcc00', roda_esq: '#00d68f', outro: '#4a5568' };
    return colors[type] || '#e8edf5';
  }

  async exportPDF() {
    showInfo('Gerando PDF... aguarde');
    try {
      const pdf = new ScenePDFGenerator(this.scene.export());
      await pdf.generate('scene_relatorio.pdf');
      showInfo('✓ PDF gerado com sucesso!');
    } catch (e) { showError('Erro ao gerar PDF: ' + e.message); }
  }
}

// ═══════════════════════════════════════════════════════════════════
// PDF GENERATOR
// ═══════════════════════════════════════════════════════════════════
class ScenePDFGenerator {
  constructor(sceneData) { this.data = sceneData; }

  async generate(filename) {
    const html = this.generateHTML();
    const container = document.createElement('div');
    container.innerHTML = html;
    container.style.position = 'absolute';
    container.style.left = '-9999px';
    container.style.width = '1000px';
    document.body.appendChild(container);

    try {
      const canvas = await html2canvas(container, { scale: 2, backgroundColor: '#0a0c10', logging: false });
      const imgData = canvas.toDataURL('image/png');
      const imgWidth = 210;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
      pdf.save(filename);
    } finally { document.body.removeChild(container); }
  }

  generateHTML() {
    const { zeroPoint, markers, exportedAt } = this.data;
    if (!zeroPoint) return '<div style="padding:20px;">Nenhuma cena definida</div>';

    return `
      <div style="padding:20px;font-family:monospace;background:#0a0c10;color:#e8edf5;width:100%;">
        <h1 style="color:#00e5ff;text-align:center;margin:0 0 20px 0;border-bottom:2px solid #1e2530;padding-bottom:15px;">📋 RELATÓRIO DE CENA</h1>
        <div style="margin:20px 0;border:2px solid #1e2530;padding:15px;border-radius:8px;background:#10141c;">
          <h2 style="color:#ff6b00;margin:0 0 15px 0;font-size:16px;">📍 PONTO ZERO</h2>
          <table style="width:100%;font-size:13px;line-height:1.8;">
            <tr><td style="color:#00e5ff;font-weight:bold;width:30%;">Latitude:</td><td>${zeroPoint.latitude.toFixed(6)}</td></tr>
            <tr><td style="color:#00e5ff;font-weight:bold;">Longitude:</td><td>${zeroPoint.longitude.toFixed(6)}</td></tr>
            <tr><td style="color:#00e5ff;font-weight:bold;">Data/Hora:</td><td>${new Date(zeroPoint.timestamp).toLocaleString('pt-BR')}</td></tr>
          </table>
        </div>
        ${markers.length > 0 ? `
          <div style="margin:20px 0;border:2px solid #1e2530;padding:15px;border-radius:8px;background:#10141c;">
            <h2 style="color:#00e5ff;margin:0 0 15px 0;font-size:16px;">📍 MARCADORES (${markers.length})</h2>
            <table style="width:100%;border-collapse:collapse;">
              <tr style="background:#1e2530;"><th style="padding:10px;color:#00e5ff;border-bottom:2px solid #00e5ff;text-align:left;">Tipo</th><th style="padding:10px;color:#00e5ff;border-bottom:2px solid #00e5ff;text-align:right;">Distância</th><th style="padding:10px;color:#00e5ff;border-bottom:2px solid #00e5ff;">X</th><th style="padding:10px;color:#00e5ff;border-bottom:2px solid #00e5ff;">Y</th></tr>
              ${markers.map(m => `
                <tr style="border-bottom:1px solid #1e2530;"><td style="padding:10px;color:${this.getMarkerColor(m.type)};font-weight:bold;">${this.getMarkerLabel(m.type)}</td><td style="padding:10px;text-align:right;color:#00e5ff;font-weight:bold;">${m.distanceFromZero.toFixed(1)} m</td><td style="padding:10px;color:#e8edf5;">${m.xRelative.toFixed(2)}m</td><td style="padding:10px;color:#e8edf5;">${m.yRelative.toFixed(2)}m</td></tr>
              `).join('')}
            </table>
          </div>
        ` : ''}
        <div style="margin-top:40px;padding-top:20px;border-top:2px solid #1e2530;font-size:11px;color:#4a5568;text-align:center;">
          <p>Gerado: ${new Date(exportedAt).toLocaleString('pt-BR')}</p>
        </div>
      </div>
    `;
  }

  getMarkerColor(type) {
    const colors = { corpo: '#ff6b6b', colisao: '#ff6b00', frenagem: '#ffcc00', roda_esq: '#00d68f', outro: '#4a5568' };
    return colors[type] || '#e8edf5';
  }

  getMarkerLabel(type) {
    const labels = { corpo: 'CORPO', colisao: 'COLISÃO', frenagem: 'FRENAGEM', roda_esq: 'RODA ESQ', outro: 'OUTRO' };
    return labels[type] || type;
  }
}

// ═══════════════════════════════════════════════════════════════════
// INITIALIZE
// ═══════════════════════════════════════════════════════════════════
let sceneManager = null;
let sceneUI = null;

document.addEventListener('DOMContentLoaded', () => {
  sceneManager = new SceneManager();
  sceneUI = new SceneUIManager(sceneManager);
  sceneUI.updateZeroPointUI();
  sceneUI.renderMarkersList();

  // GPS Setup
  if (!navigator.geolocation) {
    showError('GPS não suportado neste dispositivo.');
    return;
  }

  // Auto-enable GPS on load (iPhone)
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        sceneUI.updateLocation(latitude, longitude);
        $('dot').className = 'status-dot active';
        $('status-txt').textContent = 'AO VIVO';
      },
      (err) => {
        showError('Habilite a localização no seu dispositivo.');
        $('dot').className = 'status-dot';
        $('status-txt').textContent = 'ERRO';
      },
      { enableHighAccuracy: true, timeout: 30000, maximumAge: 1000 }
    );
  }
});
</script>

</html>
